    function renderTxt() {
      const lines = [
        'League: '           + leagueName,
        'Season: '           + currentSeasonLbl,
        'Current Matchday: ' + currentMatchday,
        '',
        ...buildMatchLines(),
      ];
      const h2h = buildH2HLines();
      if (h2h.length) lines.push('', 'HEAD TO HEAD', ...h2h);
      return lines.join('\n');
    }

    function renderCsv() {
      return renderTxt();
    }

    function renderMd() {
      return renderTxt();
    }

    function renderPy() {
      return renderTxt();
    }

    // ── 7. Dispatch & download ──────────────────────────────────────────
    const renderers = { txt: renderTxt, csv: renderCsv, md: renderMd, py: renderPy };
    const mimeTypes = {
      txt: 'text/plain', csv: 'text/csv', md: 'text/markdown', py: 'text/x-python',
    };
    const content  = renderers[format]();
    const blob     = new Blob([content], { type: (mimeTypes[format] || 'text/plain') + ';charset=utf-8' });
    const url      = URL.createObjectURL(blob);
    const a        = document.createElement('a');
    a.href         = url;
    a.download     = fileBase + '.' + format;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

  } catch (err) {
    alert('Export failed: ' + err.message);
    console.error('[export]', err);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Export ▾'; }
  }
}

// ══════════════════════════════════════════════════════════════════════
// STANDINGS TAB
// ══════════════════════════════════════════════════════════════════════

function wireStandingsControls() {
  document.querySelectorAll('#seasonToggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      standingsSeason = parseInt(btn.dataset.season, 10);
      document.querySelectorAll('#seasonToggle button').forEach(b => b.classList.toggle('active', b === btn));
      loadStandings();
    });
  });
}

async function loadStandings() {
  const el = document.getElementById('standingsContent');
  if (!standingsLeagueId) {
    el.innerHTML = emptyStateHtml('No league selected', '');
    return;
  }
  el.innerHTML = '<div class="loading-row">Loading standings</div>';

  try {
    let rows;
    if (standingsSeason === 0) {
      rows = await api('/standings?leagueId=' + standingsLeagueId);
    } else {
      const data = await api('/standings/history?leagueId=' + standingsLeagueId + '&season=' + standingsSeason);
      rows = data.records || [];
    }
    renderStandings(rows);
  } catch (err) {
    el.innerHTML = emptyStateHtml("Couldn't load standings", err.message);
  }
}

function renderStandings(rows) {
  const el = document.getElementById('standingsContent');
  if (!rows || rows.length === 0) {
    const msg = standingsSeason === 0
      ? 'No standings recorded yet for this league.'
      : 'No archived standings for this season yet. They will appear after the next scraper cycle.';
    el.innerHTML = emptyStateHtml('Nothing here', msg);
    return;
  }

  rows.sort((a, b) => a.position - b.position);
  const total = rows.length;

  let html = '<table class="standings-table"><thead><tr>' +
    '<th class="num">#</th><th>Team</th><th class="num">P</th><th class="num">Pts</th>' +
    '<th class="num">GF</th><th class="num">GA</th><th class="num">GD</th><th>Form</th>' +
    '</tr></thead><tbody>';

  rows.forEach(r => {
    const gd = (r.goals_for ?? 0) - (r.goals_against ?? 0);
    const teamName = r.team?.name ?? ('Team ' + r.team_id);
    const form = Array.isArray(r.form) ? r.form.slice(-5) : [];
    const zoneClass = r.position <= 4 ? ' zone-top' : (r.position > total - 3 ? ' zone-bottom' : '');
    html += '<tr class="' + zoneClass.trim() + '" data-team-id="' + r.team_id + '" data-team-name="' + escapeHtml(teamName) + '">' +
      '<td class="pos-cell">' + r.position + '</td>' +
      '<td class="team-cell">' + escapeHtml(teamName) + '</td>' +
      '<td class="num p-cell">' + (r.played ?? 0) + '</td>' +
      '<td class="num pts-cell">' + (r.points ?? 0) + '</td>' +
      '<td class="num gf-cell">' + (r.goals_for ?? 0) + '</td>' +
      '<td class="num ga-cell">' + (r.goals_against ?? 0) + '</td>' +
      '<td class="num gd-cell">' + (gd > 0 ? '+' : '') + gd + '</td>' +
      '<td><div class="form-chips">' + form.map(f => '<span class="form-chip ' + f + '">' + f + '</span>').join('') + '</div></td>' +
    '</tr>';
  });
  html += '</tbody></table>';
  el.innerHTML = html;

  document.querySelectorAll('table.standings-table tr[data-team-id]').forEach(tr => {
    tr.addEventListener('click', () => {
      teamA = { id: parseInt(tr.dataset.teamId, 10), name: tr.dataset.teamName };
      teamB = null;
      groupMode = 'team';
      syncGroupToggleUI();
      selectedLeagueId = null;
      renderLeaguePills();
      renderResultsContext();
      switchTab('results');
      loadResults(true);
    });
  });
}

// ── Boot ────────────────────────────────────────────────────────────────
init();
</script>
