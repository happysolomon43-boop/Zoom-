<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zoom Data — Virtual Football</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F4F8FC;
    --surface: #FFFFFF;
    --surface-2: #EAF2FB;
    --surface-3: #DCEAF9;
    --line: #D8E4F1;
    --text: #0B2545;
    --text-dim: #5A6C87;
    --text-faint: #94A5BE;
    --blue: #1257E0;
    --blue-deep: #0A3AA6;
    --blue-bg: rgba(18,87,224,0.10);
    --green: #12B76A;
    --green-bg: rgba(18,183,106,0.12);
    --win: #12B76A;
    --draw: #94A5BE;
    --loss: #E0473F;
    --font-mono: 'IBM Plex Mono', monospace;
    --font-sans: 'Space Grotesk', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-sans);
    min-height: 100vh;
    padding-bottom: 88px;
  }

  ::selection { background: var(--blue); color: #fff; }
  a { color: inherit; }
  button { font-family: inherit; cursor: pointer; }
  input { font-family: inherit; }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(18,183,106,0.35); }
    50% { opacity: 0.5; box-shadow: 0 0 0 5px rgba(18,183,106,0); }
  }

  /* ── Sticky zone: header + ticker + channels ──────────────────────── */

  .sticky-zone {
    position: sticky;
    top: 0;
    z-index: 40;
    background: var(--bg);
    border-bottom: 1px solid var(--line);
  }

  header.hdr { padding: 14px 16px 2px; }
  .hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }

  .wordmark {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.01em;
    display: flex;
    align-items: baseline;
    gap: 2px;
    color: var(--text);
  }
  .wordmark .sep { color: var(--blue); }
  .wordmark .data { color: var(--blue-deep); }

  .eyebrow {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.09em;
    color: var(--text-faint);
    margin-top: 3px;
    margin-bottom: 12px;
  }

  .hdr-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-dim);
    width: 34px;
    height: 34px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .icon-btn.active { color: var(--blue); border-color: var(--blue); }
  .icon-btn:active { background: var(--surface-2); }

  /* ── Search overlay ─────────────────────────────────────────────── */

  .search-overlay {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.2s ease;
  }
  .search-overlay.open { max-height: 420px; }
  .search-overlay-inner { padding: 0 16px 12px; position: relative; }

  #teamSearch {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 34px 10px 12px;
    font-size: 13px;
    font-family: var(--font-sans);
    outline: none;
    transition: border-color 0.15s;
  }
  #teamSearch:focus { border-color: var(--blue); }
  #teamSearch::placeholder { color: var(--text-faint); }

  .search-clear {
    position: absolute;
    right: 8px;
    top: 9px;
    background: none;
    border: none;
    color: var(--text-faint);
    font-size: 16px;
    padding: 4px;
    display: none;
    line-height: 1;
  }
  .search-clear.visible { display: block; }

  #teamSuggestions {
    max-height: 320px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    margin-top: 8px;
    display: none;
    box-shadow: 0 8px 20px rgba(11,37,69,0.08);
  }
  #teamSuggestions.visible { display: block; }
  .suggestion-item {
    padding: 10px 14px;
    font-size: 13px;
    border-bottom: 1px solid var(--line);
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:active { background: var(--surface-2); }
  .suggestion-name { font-weight: 500; }
  .suggestion-league { color: var(--text-faint); font-size: 10.5px; font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  .suggestion-empty { padding: 16px 14px; color: var(--text-faint); font-size: 13px; text-align: center; font-family: var(--font-mono); }

  /* ── Live ticker (signature element) ───────────────────────────── */

  .ticker {
    display: flex;
    align-items: stretch;
    height: 32px;
    border-top: 1px solid var(--line);
    background: var(--surface);
  }
  .ticker-badge {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 12px;
    background: var(--green-bg);
    border-right: 1px solid var(--line);
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 10.5px;
    color: var(--green);
    letter-spacing: 0.06em;
  }
  .ticker-badge .pulse {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse-dot 1.4s ease-in-out infinite;
    flex-shrink: 0;
  }
  .ticker-viewport { flex: 1; position: relative; overflow: hidden; }
  .ticker-viewport.scrollable { overflow-x: auto; }
  .ticker-track {
    position: absolute;
    top: 0; left: 0;
    display: flex;
    align-items: center;
    height: 100%;
    white-space: nowrap;
    animation: ticker-scroll linear infinite;
  }
  .ticker-track.static { position: static; animation: none; }
  @keyframes ticker-scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .ticker-item {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 0 16px;
    height: 100%;
    font-family: var(--font-mono);
    font-size: 11.5px;
    color: var(--text-dim);
    border-right: 1px solid var(--line);
    cursor: pointer;
  }
  .ticker-item .tk-league { color: var(--text-faint); font-size: 9.5px; text-transform: uppercase; }
  .ticker-item .tk-min { color: var(--green); font-weight: 700; }
  .ticker-item .tk-score { color: var(--text); font-weight: 700; }
  .ticker-empty {
    display: flex; align-items: center; height: 100%;
    padding: 0 16px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce) {
    .ticker-track { animation: none !important; position: static !important; }
    .ticker-viewport { overflow-x: auto; }
  }

  /* ── Channel chips (league filter) ─────────────────────────────── */

  .channels {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    padding: 10px 16px;
  }
  .channels::-webkit-scrollbar { display: none; }

  .chan-chip {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 7px 12px;
    border-radius: 6px;
    white-space: nowrap;
  }
  .chan-chip.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
  }
  .chan-chip:active { transform: scale(0.97); }

  /* ── Content shell ──────────────────────────────────────────────── */

  main { padding: 14px 16px 20px; max-width: 720px; margin: 0 auto; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  .section-label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-faint);
    margin: 18px 0 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .section-label:first-child { margin-top: 0; }
  .section-label .count { color: var(--text-dim); }

  .empty-state {
    text-align: center;
    padding: 52px 20px;
    color: var(--text-faint);
  }
  .empty-state .headline {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .empty-state .sub { font-size: 13px; line-height: 1.6; max-width: 300px; margin: 0 auto; }

  .loading-row {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 36px; color: var(--text-faint);
    font-family: var(--font-mono); font-size: 12px;
  }
  .loading-row::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); animation: pulse-dot 1.2s ease-in-out infinite;
  }

  /* ── Live tab ───────────────────────────────────────────────────── */

  .live-league-block { margin-bottom: 6px; }
  .live-league-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 2px 8px;
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--text-faint);
  }
  .live-league-header:first-child { padding-top: 0; }
  .live-league-header .n { color: var(--text-dim); }

  .live-list { display: flex; flex-direction: column; gap: 6px; }

  .live-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--green);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .live-min {
    font-family: var(--font-mono); font-size: 11px; font-weight: 700;
    color: var(--green); background: var(--green-bg);
    padding: 3px 7px; border-radius: 5px;
    min-width: 32px; text-align: center; flex-shrink: 0;
  }
  .live-teams-col { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
  .live-team-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; gap: 8px; }
  .live-team-row .nm { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--text-dim); }
  .live-team-row.lead .nm { color: var(--text); font-weight: 600; }
  .live-team-row .sc { font-family: var(--font-mono); font-weight: 700; color: var(--text); flex-shrink: 0; }
  .live-ht-tag { font-family: var(--font-mono); font-size: 9px; color: var(--text-faint); flex-shrink: 0; white-space: nowrap; }

  /* ── Results tab: top controls ─────────────────────────────────── */

  .season-toggle-row { margin-bottom: 10px; }

  .season-toggle {
    display: flex;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px;
  }
  .season-toggle button {
    flex: 1;
    background: none; border: none;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10.5px; font-weight: 600;
    padding: 7px 10px; border-radius: 6px;
  }
  .season-toggle button.active { background: var(--surface); color: var(--blue); box-shadow: 0 1px 2px rgba(11,37,69,0.08); }

  .segmented {
    display: flex;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 3px; gap: 2px;
    margin-bottom: 10px;
  }
  .segmented button {
    flex: 1; background: none; border: none;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 10.5px; font-weight: 600;
    letter-spacing: 0.03em; text-transform: uppercase;
    padding: 8px 4px; border-radius: 6px;
  }
  .segmented button.active { background: var(--surface); color: var(--blue); box-shadow: 0 1px 2px rgba(11,37,69,0.08); }

  #resultsContext { margin-bottom: 4px; }

  /* ── Filter bar (League / Round modes) ───────────────────────────── */

  .filter-bar-inline {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; flex-wrap: wrap;
  }
  .date-filter { display: flex; gap: 6px; align-items: center; }
  .date-filter input[type="date"] {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text);
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 7px 8px;
    border-radius: 8px;
    color-scheme: light;
  }
  .date-filter span { color: var(--text-faint); font-size: 11px; }

  .btn-ghost {
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 11px; font-weight: 600;
    padding: 8px 12px; border-radius: 8px;
  }
  .btn-ghost:active { background: var(--surface-2); }
  .export-wrap { position: relative; margin-left: auto; }
  .btn-ghost.export { color: var(--green); border-color: rgba(18,183,106,0.35); }

  /* ── Export format picker popover ───────────────────────────────────── */
  .export-picker {
    position: absolute;
    top: calc(100% + 5px);
    right: 0;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    overflow: hidden;
    z-index: 200;
    min-width: 108px;
    box-shadow: 0 6px 20px rgba(11,37,69,0.13);
  }
  .export-picker button {
    display: block; width: 100%; text-align: left;
    padding: 9px 14px;
    background: none; border: none;
    border-bottom: 1px solid var(--line);
    color: var(--text-dim);
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    cursor: pointer; transition: background 0.12s, color 0.12s;
  }
  .export-picker button:last-child { border-bottom: none; }
  .export-picker button:hover { background: var(--surface-2); color: var(--green); }
  .export-picker-title {
    padding: 7px 14px 5px;
    font-size: 10px; font-weight: 700;
    color: var(--text-faint);
    text-transform: uppercase; letter-spacing: 0.06em;
    border-bottom: 1px solid var(--line);
    pointer-events: none;
  }

  /* ── Round navigator (Round mode) ────────────────────────────────── */

  .round-nav {
    display: flex; align-items: center; gap: 8px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 8px 10px;
    margin-bottom: 10px;
  }
  .round-arrow {
    background: var(--surface-2);
    border: 1px solid var(--line);
    color: var(--blue);
    width: 32px; height: 32px; border-radius: 8px;
    font-size: 16px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .round-arrow:active { background: var(--surface-3); }
  .round-nav-label { flex: 1; text-align: center; min-width: 0; }
  .round-nav-label .round-num {
    display: block; font-family: var(--font-mono); font-weight: 700; font-size: 13.5px; color: var(--text);
  }
  .round-nav-label .round-date {
    display: block; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); margin-top: 1px;
  }
  .round-jump { display: flex; gap: 4px; flex-shrink: 0; }
  .round-jump input {
    width: 52px;
    background: var(--surface-2);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 12px;
    padding: 6px 6px;
    text-align: center;
  }
  .round-jump input::placeholder { color: var(--text-faint); }
  .round-jump button { padding: 6px 10px; font-size: 10.5px; }

  /* ── Team picker row (Team mode) ─────────────────────────────────── */

  .team-picker-row {
    display: flex; align-items: flex-start; gap: 8px;
    margin-bottom: 10px;
  }
  .team-picker { flex: 1; position: relative; min-width: 0; }
  .team-picker-input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    color: var(--text);
    padding: 10px 30px 10px 12px;
    font-size: 12.5px;
    font-family: var(--font-sans);
    outline: none;
  }
  .team-picker-input:focus { border-color: var(--blue); }
  .team-picker-input:disabled { opacity: 0.5; }
  .team-picker .search-clear { top: 9px; }
  .team-picker-suggestions {
    position: absolute; left: 0; right: 0; top: calc(100% + 6px);
    max-height: 280px; overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 8px;
    display: none;
    z-index: 20;
    box-shadow: 0 10px 24px rgba(11,37,69,0.12);
  }
  .team-picker-suggestions.visible { display: block; }
  .vs-label {
    flex-shrink: 0; align-self: center;
    font-family: var(--font-mono); font-size: 10px; font-weight: 700;
    color: var(--text-faint); letter-spacing: 0.06em;
    padding: 0 2px;
  }

  .team-picker-prompt {
    text-align: center; padding: 30px 16px;
    color: var(--text-faint); font-size: 13px;
    font-family: var(--font-mono);
    line-height: 1.6;
  }

  /* ── Results list ────────────────────────────────────────────────── */

  .match-group { margin-bottom: 16px; }
  .group-header {
    font-family: var(--font-mono);
    font-size: 11.5px; font-weight: 600;
    color: var(--text);
    text-transform: uppercase; letter-spacing: 0.04em;
    padding: 8px 10px;
    background: var(--blue-bg);
    border-radius: 8px 8px 0 0;
    border-left: 3px solid var(--blue);
    margin-bottom: 0;
    display: flex; justify-content: space-between;
  }
  .group-header .meta { color: var(--text-dim); font-weight: 400; text-transform: none; letter-spacing: normal; font-size: 11px; }

  .match-group > .match-row:first-of-type { border-top: none; }
  .match-group { border: 1px solid var(--line); border-top: none; border-radius: 0 0 8px 8px; overflow: hidden; background: var(--surface); }
  .match-group .group-header { border: 1px solid var(--line); border-bottom: none; margin: -1px -1px 0 -1px; border-radius: 8px 8px 0 0; }

  .match-row { border-bottom: 1px solid var(--line); }
  .match-row:last-child { border-bottom: none; }
  .match-row-main {
    display: grid;
    grid-template-columns: 46px 1fr auto 1fr 16px;
    align-items: center;
    gap: 8px;
    padding: 11px 10px;
  }
  .match-time {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text-faint);
    display: flex;
    flex-direction: column;
    line-height: 1.35;
    white-space: nowrap;
  }
  .match-time .t { color: var(--text-dim); font-weight: 600; font-size: 9.5px; }
  .match-team-name {
    font-size: 13px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    color: var(--text-dim);
  }
  .match-team-name.home { text-align: right; }
  .match-team-name.away { text-align: left; }
  .match-team-name.winner { color: var(--text); font-weight: 600; }
  .match-score-box { display: flex; flex-direction: column; align-items: center; font-family: var(--font-mono); flex-shrink: 0; }
  .match-score-box .full { font-weight: 700; font-size: 13.5px; color: var(--text); white-space: nowrap; }
  .match-score-box .ht { font-size: 9px; color: var(--text-faint); margin-top: 1px; white-space: nowrap; }
  .expand-chevron { color: var(--text-faint); font-size: 11px; flex-shrink: 0; transition: transform 0.15s; text-align: center; }
  .match-row.open .expand-chevron { transform: rotate(180deg); }

  .match-detail { display: none; padding: 4px 14px 14px; border-top: 1px solid var(--line); font-size: 12.5px; background: var(--surface-2); }
  .match-row.open .match-detail { display: block; }

  .detail-section { margin-top: 10px; }
  .detail-label {
    font-family: var(--font-mono); font-size: 10px;
    text-transform: uppercase; letter-spacing: 0.06em;
    color: var(--text-faint); margin-bottom: 6px;
  }
  .goal-line { display: flex; justify-content: space-between; padding: 3px 0; color: var(--text-dim); }
  .goal-line .min { font-family: var(--font-mono); color: var(--blue); }

  .stat-bar-row { margin-bottom: 8px; }
  .stat-bar-labels { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 11px; margin-bottom: 3px; }
  .stat-bar-track { height: 5px; background: var(--surface-3); border-radius: 3px; overflow: hidden; display: flex; }
  .stat-bar-home { background: var(--blue); height: 100%; }
  .stat-bar-away { background: var(--green); height: 100%; }

  .no-detail { color: var(--text-faint); font-size: 12px; padding: 8px 0; font-family: var(--font-mono); }

  .h2h-count { color: var(--text-faint); font-weight: 400; text-transform: none; letter-spacing: normal; }
  .h2h-row {
    display: grid;
    grid-template-columns: 40px 1fr auto 1fr;
    align-items: center;
    gap: 6px;
    padding: 10px;
    font-size: 12.5px;
    color: var(--text-dim);
  }
  .h2h-row + .h2h-row { border-top: 1px solid var(--line); }
  .h2h-date { font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .h2h-team { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .h2h-team:last-child { text-align: right; }
  .h2h-team.winner { color: var(--text); font-weight: 600; }
  .h2h-score { font-family: var(--font-mono); font-weight: 700; color: var(--text); padding: 0 4px; white-space: nowrap; }

  .load-more-btn {
    display: block; width: 100%;
    background: var(--surface);
    border: 1px solid var(--line);
    color: var(--blue);
    font-family: var(--font-mono);
    font-size: 12.5px; font-weight: 600;
    padding: 12px; border-radius: 10px;
    margin-top: 8px;
  }
  .load-more-btn:active { background: var(--surface-2); }

  /* ── Standings tab ──────────────────────────────────────────────── */

  .standings-controls { display: flex; justify-content: flex-end; margin-bottom: 12px; }

  .zone-key { display: flex; gap: 14px; margin-bottom: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--text-faint); }
  .zone-key span { display: flex; align-items: center; gap: 5px; }
  .zone-key .sw { width: 8px; height: 8px; border-radius: 2px; }

  table.standings-table { width: 100%; border-collapse: collapse; font-size: 12.5px; background: var(--surface); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  table.standings-table th {
    text-align: left;
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase; letter-spacing: 0.04em;
    color: var(--text-faint);
    padding: 8px 6px;
    border-bottom: 1px solid var(--line);
    background: var(--surface-2);
    font-weight: 600;
  }
  table.standings-table th.num, table.standings-table td.num { text-align: center; }
  table.standings-table td { padding: 9px 6px; border-bottom: 1px solid var(--line); }
  table.standings-table tr:last-child td { border-bottom: none; }
  table.standings-table tr:active { background: var(--surface-2); }
  table.standings-table tr.zone-top td:first-child { box-shadow: inset 3px 0 0 var(--blue); }
  table.standings-table tr.zone-bottom td:first-child { box-shadow: inset 3px 0 0 var(--loss); }
  .pos-cell { font-family: var(--font-mono); color: var(--text-faint); width: 22px; padding-left: 10px !important; }
  .team-cell { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px; }
  .pts-cell { font-family: var(--font-mono); font-weight: 700; }
  .gf-cell, .ga-cell, .gd-cell, .p-cell { font-family: var(--font-mono); color: var(--text-dim); }

  .form-chips { display: flex; gap: 2px; }
  .form-chip {
    width: 16px; height: 16px; border-radius: 3px;
    font-size: 9px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono);
  }
  .form-chip.W { background: rgba(18,183,106,0.14); color: var(--win); }
  .form-chip.D { background: rgba(148,148,168,0.14); color: var(--draw); }
  .form-chip.L { background: rgba(224,71,63,0.14); color: var(--loss); }

  /* ── Bottom nav ─────────────────────────────────────────────────── */

  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
    display: flex;
    background: rgba(255,255,255,0.94);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    padding: 6px 8px calc(6px + env(safe-area-inset-bottom));
  }
  .nav-btn {
    flex: 1; position: relative;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none;
    color: var(--text-faint);
    padding: 8px 4px; border-radius: 10px;
  }
  .nav-btn.active { color: var(--blue); }
  .nav-btn.active::before {
    content: '';
    position: absolute; top: -7px; left: 30%; right: 30%;
    height: 2px; background: var(--blue); border-radius: 2px;
  }
  .nav-btn .code { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.06em; color: var(--text-faint); }
  .nav-btn.active .code { color: var(--blue); }
  .nav-btn .label { font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.03em; text-transform: uppercase; }
  .nav-btn .badge {
    position: absolute; top: 2px; right: 22%;
    background: var(--green); color: #fff;
    font-family: var(--font-mono); font-size: 9px; font-weight: 700;
    min-width: 15px; height: 15px; border-radius: 8px;
    display: none; align-items: center; justify-content: center; padding: 0 3px;
  }
  .nav-btn .badge.show { display: flex; }

  @media (max-width: 380px) {
    .team-cell { max-width: 88px; }
    table.standings-table th, table.standings-table td { padding: 8px 4px; }
  }
</style>
</head>
<body>

<div class="sticky-zone">
  <header class="hdr">
    <div class="hdr-row">
      <div>
        <div class="wordmark">ZOOM<span class="sep">/</span><span class="data">DATA</span></div>
      </div>
      <div class="hdr-actions">
        <button class="icon-btn" id="searchToggle" aria-label="Search teams">⌕</button>
      </div>
    </div>
    <div class="eyebrow">9 LEAGUES · CONTINUOUS ROUNDS</div>
  </header>

  <div class="search-overlay" id="searchOverlay">
    <div class="search-overlay-inner">
      <input type="text" id="teamSearch" placeholder="Search team…" autocomplete="off">
      <button class="search-clear" id="searchClear">×</button>
      <div id="teamSuggestions"></div>
    </div>
  </div>

  <div class="ticker" id="liveTicker">
    <div class="ticker-badge"><span class="pulse"></span>LIVE</div>
    <div class="ticker-viewport" id="tickerViewport">
      <div class="ticker-track" id="tickerTrack"><div class="ticker-empty">Connecting…</div></div>
    </div>
  </div>

  <div class="channels" id="leaguePills"></div>
</div>

<main>

  <!-- LIVE TAB -->
  <div class="tab-panel active" id="panel-live">
    <div id="liveContent"><div class="loading-row">Loading live matches</div></div>
  </div>

  <!-- RESULTS TAB -->
  <div class="tab-panel" id="panel-results">
    <div class="season-toggle-row">
      <div class="season-toggle" id="resultsSeasonToggle">
        <button data-season="0" class="active">Current</button>
        <button data-season="1">Previous</button>
        <button data-season="2">Oldest</button>
      </div>
    </div>
    <div class="segmented" id="groupToggle">
      <button data-group="league" class="active">League</button>
      <button data-group="round">Round</button>
      <button data-group="team">Team</button>
    </div>
    <div id="resultsContext"></div>
    <div id="resultsContent"><div class="loading-row">Loading results</div></div>
  </div>

  <!-- STANDINGS TAB -->
  <div class="tab-panel" id="panel-standings">
    <div class="channels" id="standingsLeaguePills" style="padding:0 0 12px;"></div>
    <div class="standings-controls">
      <div class="season-toggle" id="seasonToggle">
        <button data-season="0" class="active">Current</button>
        <button data-season="1">Prev.</button>
        <button data-season="2">Oldest</button>
      </div>
    </div>
    <div class="zone-key">
      <span><span class="sw" style="background:var(--blue)"></span>Top 4</span>
      <span><span class="sw" style="background:var(--loss)"></span>Bottom 3</span>
    </div>
    <div id="standingsContent"><div class="loading-row">Loading standings</div></div>
  </div>

</main>

<nav class="bottom-nav">
  <button class="nav-btn active" data-tab="live">
    <span class="code">01</span>
    <span class="label">Live</span>
    <span class="badge" id="navBadgeLive"></span>
  </button>
  <button class="nav-btn" data-tab="results">
    <span class="code">02</span>
    <span class="label">Results</span>
  </button>
  <button class="nav-btn" data-tab="standings">
    <span class="code">03</span>
    <span class="label">Table</span>
  </button>
</nav>

<script>
'use strict';

// ── Config ──────────────────────────────────────────────────────────────
const API_BASE = 'https://zoom-ckbz.onrender.com';

// ── State ───────────────────────────────────────────────────────────────
let leagues = [];              // [{id, name, live_round, ...}]
let allTeams = [];             // [{id, name, short_name}]
let activeTab = 'live';
let selectedLeagueId = null;   // null = all leagues. Drives Live tab, League-mode results, and Round-mode results.
let standingsLeagueId = null;  // Standings tab always needs one league picked
let standingsSeason = 0;

let resultsSeason = 0;         // 0 current / 1 previous / 2 oldest — applies to Results tab
let groupMode = 'league';      // 'league' | 'round' | 'team'
let currentRoundId = null;     // active round number in Round mode (null = not yet seeded)
let teamA = null;              // {id, name} — Team mode, slot 1
let teamB = null;              // {id, name} — Team mode, slot 2 (optional, triggers head-to-head)
let dateFrom = null;           // narrows League/Round mode results
let dateTo = null;

let resultsOffset = 0;
const RESULTS_PAGE_SIZE = 100;
let resultsTotal = 0;
let loadedMatches = [];        // accumulated across "load more" clicks
let matchDetailCache = {};     // matchId -> { goals, stats, h2h }

let liveTimer = null;
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ── Fetch helpers ───────────────────────────────────────────────────────
async function api(path) {
  const res = await fetch(API_BASE + path);
  if (!res.ok) throw new Error('API ' + path + ' → HTTP ' + res.status);
  return res.json();
}

function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString(undefined, { day: '2-digit', month: 'short' });
}

function fmtTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
}

// Virtual leagues can run many rounds a day, so every match needs both its
// date AND its kickoff time to be unambiguous — "Jul 9, 14:00" not just "Jul 9".
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  const datePart = d.toLocaleDateString(undefined, { day: '2-digit', month: 'short' });
  const timePart = d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });
  return datePart + ', ' + timePart;
}

function shortLeagueName(name) {
  return (name ?? '').replace('-Zoom', '');
}

function escapeHtml(s) {
  const div = document.createElement('div');
  div.textContent = s ?? '';
  return div.innerHTML;
}

function emptyStateHtml(headline, sub) {
  return '<div class="empty-state"><div class="headline">' + escapeHtml(headline) + '</div><div class="sub">' + escapeHtml(sub) + '</div></div>';
}

// ── Team search: substring match anywhere in the name, ranked by how ──
// early the match occurs, then by name length. Works from 2 characters,
// so "art" finds "Aston Villa"... no — finds names *containing* "art",
// and progressively narrows as more letters are typed.
function teamSearchScore(name, query) {
  const n = (name || '').toLowerCase();
  const q = query.trim().toLowerCase();
  if (q.length < 2) return -1;
  return n.indexOf(q);
}

function searchTeams(query, excludeId) {
  return allTeams
    .filter(t => t.id !== excludeId)
    .map(t => ({ team: t, score: teamSearchScore(t.name, query) }))
    .filter(x => x.score !== -1)
    .sort((a, b) => a.score - b.score || a.team.name.length - b.team.name.length)
    .slice(0, 20)
    .map(x => x.team);
}

const teamLeagueHints = {};
function leagueNameForTeam(teamId) {
  const known = teamLeagueHints[teamId];
  return known ? shortLeagueName(known) : '';
}
function cacheLeagueHint(m) {
  if (m.league?.name) {
    if (m.home_team_id) teamLeagueHints[m.home_team_id] = m.league.name;
    if (m.away_team_id) teamLeagueHints[m.away_team_id] = m.league.name;
  }
}

// ── Init ────────────────────────────────────────────────────────────────
async function init() {
  wireNav();
  wireSearch();
  wireResultsControls();
  wireStandingsControls();

  try {
    leagues = await api('/leagues');
  } catch (err) {
    leagues = [];
    console.error('Failed to load leagues:', err.message);
  }
  renderLeaguePills();
  renderStandingsLeaguePills();

  try {
    allTeams = await api('/teams');
  } catch (err) {
    allTeams = [];
    console.error('Failed to load teams:', err.message);
  }

  if (leagues.length > 0 && standingsLeagueId === null) {
    standingsLeagueId = leagues[0].id;
    renderStandingsLeaguePills();
  }

  renderResultsContext();

  loadLive();
  loadTicker();
  liveTimer = setInterval(() => { loadLive(); loadTicker(); }, 30000);
  loadResults(true);
  loadStandings();
}

// ── Bottom nav ──────────────────────────────────────────────────────────
function wireNav() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.tab));
  });
}

function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
  restartTabAutoRefresh();
}

// ── Tab auto-refresh ─────────────────────────────────────────────────────
// FIX: only the Live tab auto-refreshed (every 30s). Results and Standings
// never refreshed on their own — the moment a round finished, nothing on
// screen changed until the user manually switched tabs or reloaded the
// page, which looked like "updates take minutes" even when the backend had
// already written the new round seconds earlier. Poll whichever tab is
// currently visible so a finished round shows up within one interval.
const TAB_REFRESH_MS = 20000; // matches the backend fast-cycle cadence
let resultsTimer = null;
let standingsTimer = null;

function restartTabAutoRefresh() {
  clearInterval(resultsTimer);
  clearInterval(standingsTimer);
  resultsTimer = null;
  standingsTimer = null;

  if (activeTab === 'results') {
    // Only auto-refresh the live "current season" results feed in the
    // default league grouping — previous/oldest seasons are historical and
    // don't change, and a live head-to-head/round lookup shouldn't have its
    // scroll position reset out from under the user every 20s.
    if (groupMode === 'league' && Number(resultsSeason) === 0) {
      resultsTimer = setInterval(() => loadResults(true), TAB_REFRESH_MS);
    } else if (groupMode === 'round' && Number(resultsSeason) === 0) {
      resultsTimer = setInterval(() => loadRoundResults(), TAB_REFRESH_MS);
    }
  } else if (activeTab === 'standings') {
    standingsTimer = setInterval(() => loadStandings(), TAB_REFRESH_MS);
  }
}

// ── League chips (Live / Results-League / Results-Round) ───────────────
function selectLeague(id) {
  selectedLeagueId = id;
  currentRoundId = null;
  renderLeaguePills();
  loadLive();
  renderResultsContext();
  loadResults(true);
}

function renderLeaguePills() {
  const wrap = document.getElementById('leaguePills');
  wrap.innerHTML = '';
  const allPill = document.createElement('button');
  allPill.className = 'chan-chip' + (selectedLeagueId === null ? ' active' : '');
  allPill.textContent = 'ALL';
  allPill.onclick = () => selectLeague(null);
  wrap.appendChild(allPill);

  leagues.forEach(lg => {
    const pill = document.createElement('button');
    pill.className = 'chan-chip' + (selectedLeagueId === lg.id ? ' active' : '');
    pill.textContent = shortLeagueName(lg.name).toUpperCase();
    pill.onclick = () => selectLeague(lg.id);
    wrap.appendChild(pill);
  });
}

function renderStandingsLeaguePills() {
  const wrap = document.getElementById('standingsLeaguePills');
  wrap.innerHTML = '';
  leagues.forEach(lg => {
    const pill = document.createElement('button');
    pill.className = 'chan-chip' + (standingsLeagueId === lg.id ? ' active' : '');
    pill.textContent = shortLeagueName(lg.name).toUpperCase();
    pill.onclick = () => { standingsLeagueId = lg.id; renderStandingsLeaguePills(); loadStandings(); };
    wrap.appendChild(pill);
  });
}

// ── Header search overlay (jumps straight into Team mode) ──────────────
function wireSearch() {
  const toggleBtn = document.getElementById('searchToggle');
  const overlay = document.getElementById('searchOverlay');
  const input = document.getElementById('teamSearch');
  const clearBtn = document.getElementById('searchClear');
  const suggestions = document.getElementById('teamSuggestions');

  toggleBtn.addEventListener('click', () => {
    const willOpen = !overlay.classList.contains('open');
    overlay.classList.toggle('open', willOpen);
    toggleBtn.classList.toggle('active', willOpen);
    if (willOpen) setTimeout(() => input.focus(), 150);
  });

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    if (q.length < 2) { suggestions.classList.remove('visible'); return; }

    const matches = searchTeams(q, null);
    suggestions.innerHTML = '';
    if (matches.length === 0) {
      suggestions.innerHTML = '<div class="suggestion-empty">No teams match "' + escapeHtml(q) + '"</div>';
    } else {
      matches.forEach(team => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = '<span class="suggestion-name">' + escapeHtml(team.name) + '</span>' +
                          '<span class="suggestion-league">' + escapeHtml(leagueNameForTeam(team.id)) + '</span>';
        item.onclick = () => {
          teamA = team;
          teamB = null;
          input.value = '';
          suggestions.classList.remove('visible');
          overlay.classList.remove('open');
          toggleBtn.classList.remove('active');
          groupMode = 'team';
          syncGroupToggleUI();
          renderResultsContext();
          switchTab('results');
          loadResults(true);
        };
        suggestions.appendChild(item);
      });
    }
    suggestions.classList.add('visible');
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('visible');
    suggestions.classList.remove('visible');
  });
}

// ── LIVE TICKER (signature element — always reflects ALL leagues) ──────
async function loadTicker() {
  try {
    const data = await api('/live');
    renderTicker(data.live_matches || []);
  } catch (err) {
    renderTicker([], true);
  }
}

function renderTicker(matches, failed) {
  const viewport = document.getElementById('tickerViewport');
  const track = document.getElementById('tickerTrack');
  const badge = document.getElementById('navBadgeLive');

  badge.textContent = matches.length > 99 ? '99+' : String(matches.length);
  badge.classList.toggle('show', matches.length > 0);

  if (failed) {
    viewport.classList.remove('scrollable');
    track.className = 'ticker-track static';
    track.style.animation = 'none';
    track.innerHTML = '<div class="ticker-empty">Signal unavailable — retrying…</div>';
    return;
  }

  if (matches.length === 0) {
    viewport.classList.remove('scrollable');
    track.className = 'ticker-track static';
    track.style.animation = 'none';
    track.innerHTML = '<div class="ticker-empty">No live rounds right now</div>';
    return;
  }

  const itemsHtml = matches.map(m => {
    cacheLeagueHint(m);
    const homeName = m.home_team?.short_name ?? m.home_team?.name ?? ('Team ' + m.home_team_id);
    const awayName = m.away_team?.short_name ?? m.away_team?.name ?? ('Team ' + m.away_team_id);
    const minute = m.match_minute != null ? m.match_minute + "'" : 'LIVE';
    return '<div class="ticker-item" data-league-id="' + (m.league?.id ?? '') + '">' +
      '<span class="tk-league">' + escapeHtml(shortLeagueName(m.league?.name)) + '</span>' +
      '<span class="tk-min">' + escapeHtml(minute) + '</span>' +
      '<span>' + escapeHtml(homeName) + '</span>' +
      '<span class="tk-score">' + (m.home_score ?? 0) + '–' + (m.away_score ?? 0) + '</span>' +
      '<span>' + escapeHtml(awayName) + '</span>' +
    '</div>';
  }).join('');

  if (prefersReducedMotion) {
    viewport.classList.add('scrollable');
    track.className = 'ticker-track static';
    track.innerHTML = itemsHtml;
  } else {
    viewport.classList.remove('scrollable');
    track.className = 'ticker-track';
    const durationSec = Math.max(18, matches.length * 5);
    track.style.animationDuration = durationSec + 's';
    track.innerHTML = itemsHtml + itemsHtml; // duplicated for seamless loop
  }

  track.querySelectorAll('.ticker-item').forEach(item => {
    item.addEventListener('click', () => {
      const lid = item.dataset.leagueId;
      selectLeague(lid ? parseInt(lid, 10) : null);
      switchTab('live');
    });
  });
}

// ── LIVE TAB (filtered by selected league) ──────────────────────────────
async function loadLive() {
  const el = document.getElementById('liveContent');
  try {
    const path = selectedLeagueId ? '/live?leagueId=' + selectedLeagueId : '/live';
    const data = await api(path);
    renderLive(data.live_matches || []);
  } catch (err) {
    el.innerHTML = emptyStateHtml("Couldn't load live matches", err.message);
  }
}

function renderLive(matches) {
  const el = document.getElementById('liveContent');

  if (matches.length === 0) {
    el.innerHTML = emptyStateHtml('Nothing live in this selection', 'No round is currently in progress here. Try "All", or check the ticker above for what\'s live elsewhere.');
    return;
  }

  const byLeague = new Map();
  matches.forEach(m => {
    cacheLeagueHint(m);
    const key = shortLeagueName(m.league?.name) || 'Unknown League';
    if (!byLeague.has(key)) byLeague.set(key, []);
    byLeague.get(key).push(m);
  });

  let html = '';
  byLeague.forEach((items, leagueName) => {
    html += '<div class="live-league-block"><div class="live-league-header"><span>' + escapeHtml(leagueName) + '</span><span class="n">' + items.length + ' live</span></div><div class="live-list">';
    items.forEach(m => {
      const homeName = m.home_team?.name ?? ('Team ' + m.home_team_id);
      const awayName = m.away_team?.name ?? ('Team ' + m.away_team_id);
      const homeLead = (m.home_score ?? 0) > (m.away_score ?? 0);
      const awayLead = (m.away_score ?? 0) > (m.home_score ?? 0);
      const minute = m.match_minute != null ? m.match_minute + "'" : '—';
      html += '<div class="live-row">' +
        '<div class="live-min">' + escapeHtml(minute) + '</div>' +
        '<div class="live-teams-col">' +
          '<div class="live-team-row' + (homeLead ? ' lead' : '') + '"><span class="nm">' + escapeHtml(homeName) + '</span><span class="sc">' + (m.home_score ?? 0) + '</span></div>' +
          '<div class="live-team-row' + (awayLead ? ' lead' : '') + '"><span class="nm">' + escapeHtml(awayName) + '</span><span class="sc">' + (m.away_score ?? 0) + '</span></div>' +
        '</div>' +
        (m.ht_home_score != null ? '<div class="live-ht-tag">HT ' + m.ht_home_score + '–' + m.ht_away_score + '</div>' : '') +
      '</div>';
    });
    html += '</div></div>';
  });

  el.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════════
// RESULTS TAB
// ══════════════════════════════════════════════════════════════════════

function wireResultsControls() {
  document.querySelectorAll('#groupToggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      groupMode = btn.dataset.group;
      syncGroupToggleUI();
      dateFrom = null; dateTo = null;
      renderResultsContext();
      loadResults(true);
      restartTabAutoRefresh(); // groupMode affects auto-refresh eligibility
    });
  });

  document.querySelectorAll('#resultsSeasonToggle button').forEach(btn => {
    btn.addEventListener('click', () => {
      resultsSeason = parseInt(btn.dataset.season, 10);
      document.querySelectorAll('#resultsSeasonToggle button').forEach(b => b.classList.toggle('active', b === btn));
      currentRoundId = null;
      loadResults(true);
      restartTabAutoRefresh(); // resultsSeason affects auto-refresh eligibility
    });
  });
}

function syncGroupToggleUI() {
  document.querySelectorAll('#groupToggle button').forEach(b => b.classList.toggle('active', b.dataset.group === groupMode));
}

// ── Context row: rebuilt whenever groupMode / league / team selections change
function renderResultsContext() {
  const el = document.getElementById('resultsContext');

  if (groupMode === 'team') {
    el.innerHTML = teamPickerRowHtml();
    wireTeamPickers();
    return;
  }

  if (groupMode === 'round') {
    if (!selectedLeagueId) {
      el.innerHTML = '<div class="team-picker-prompt">Pick a league above to browse results round by round.</div>';
      return;
    }
    el.innerHTML = roundNavHtml() + filterBarHtml();
    wireRoundNav();
    wireFilterBar();
    updateRoundLabel();
    return;
  }

  // league mode
  el.innerHTML = filterBarHtml();
  wireFilterBar();
}

function filterBarHtml() {
  return '<div class="filter-bar-inline">' +
    '<div class="date-filter">' +
      '<input type="date" id="dateFrom" value="' + (dateFrom ?? '') + '">' +
      '<span>–</span>' +
      '<input type="date" id="dateTo" value="' + (dateTo ?? '') + '">' +
    '</div>' +
    '<div class="export-wrap">' +
      '<button class="btn-ghost export" id="exportCsvBtn">Export ▾</button>' +
    '</div>' +
  '</div>';
}

function wireFilterBar() {
  const df = document.getElementById('dateFrom');
  const dt = document.getElementById('dateTo');
  if (df) df.addEventListener('change', e => { dateFrom = e.target.value || null; renderResults(); });
  if (dt) dt.addEventListener('change', e => { dateTo = e.target.value || null; renderResults(); });
  const exp = document.getElementById('exportCsvBtn');
  if (exp) exp.addEventListener('click', e => { e.stopPropagation(); toggleExportPicker(exp); });
}

// ── Round navigator ──────────────────────────────────────────────────
function roundNavHtml() {
  return '<div class="round-nav">' +
    '<button class="round-arrow" id="roundPrev" aria-label="Previous round">‹</button>' +
    '<div class="round-nav-label">' +
      '<span class="round-num" id="roundLabel">Round —</span>' +
      '<span class="round-date" id="roundDateLabel"></span>' +
    '</div>' +
    '<button class="round-arrow" id="roundNext" aria-label="Next round">›</button>' +
    '<div class="round-jump">' +
      '<input type="number" id="roundJumpInput" placeholder="#" inputmode="numeric" min="1">' +
      '<button class="btn-ghost" id="roundJumpBtn">Go</button>' +
    '</div>' +
  '</div>';
}

function wireRoundNav() {
  document.getElementById('roundPrev').addEventListener('click', () => {
    currentRoundId = Math.max(1, (currentRoundId ?? 2) - 1);
    loadResults(true);
  });
  document.getElementById('roundNext').addEventListener('click', () => {
    currentRoundId = (currentRoundId ?? 0) + 1;
    loadResults(true);
  });
  document.getElementById('roundJumpBtn').addEventListener('click', () => {
    const v = parseInt(document.getElementById('roundJumpInput').value, 10);
    if (Number.isFinite(v) && v > 0) { currentRoundId = v; loadResults(true); }
  });
}

function updateRoundLabel() {
  const lbl = document.getElementById('roundLabel');
  const dateLbl = document.getElementById('roundDateLabel');
  if (!lbl) return;
  lbl.textContent = 'Round ' + (currentRoundId ?? '—');
  const first = loadedMatches[0];
  dateLbl.textContent = first ? fmtDateTime(first.round_time) : (groupMode === 'round' ? 'No matches yet' : '');
}

// ── Team picker row ──────────────────────────────────────────────────
function teamPickerRowHtml() {
  return '<div class="team-picker-row">' +
    '<div class="team-picker">' +
      '<input type="text" class="team-picker-input" id="teamAInput" placeholder="Search a team…" autocomplete="off" value="' + (teamA ? escapeHtml(teamA.name) : '') + '">' +
      '<button class="search-clear' + (teamA ? ' visible' : '') + '" id="teamAClear">×</button>' +
      '<div class="team-picker-suggestions" id="teamASuggestions"></div>' +
    '</div>' +
    '<div class="vs-label">VS</div>' +
    '<div class="team-picker">' +
      '<input type="text" class="team-picker-input" id="teamBInput" placeholder="Compare with…" autocomplete="off" value="' + (teamB ? escapeHtml(teamB.name) : '') + '"' + (teamA ? '' : ' disabled') + '>' +
      '<button class="search-clear' + (teamB ? ' visible' : '') + '" id="teamBClear">×</button>' +
      '<div class="team-picker-suggestions" id="teamBSuggestions"></div>' +
    '</div>' +
  '</div>';
}

function setupTeamPicker(prefix, excludeIdFn, onSelect, onClear) {
  const input = document.getElementById(prefix + 'Input');
  const clearBtn = document.getElementById(prefix + 'Clear');
  const sugg = document.getElementById(prefix + 'Suggestions');
  if (!input) return;

  input.addEventListener('input', () => {
    const q = input.value.trim();
    clearBtn.classList.toggle('visible', q.length > 0);
    if (q.length < 2) { sugg.classList.remove('visible'); return; }

    const matches = searchTeams(q, excludeIdFn());
    sugg.innerHTML = '';
    if (matches.length === 0) {
      sugg.innerHTML = '<div class="suggestion-empty">No teams match "' + escapeHtml(q) + '"</div>';
    } else {
      matches.forEach(team => {
        const item = document.createElement('div');
        item.className = 'suggestion-item';
        item.innerHTML = '<span class="suggestion-name">' + escapeHtml(team.name) + '</span>' +
                          '<span class="suggestion-league">' + escapeHtml(leagueNameForTeam(team.id)) + '</span>';
        item.onclick = () => {
          input.value = team.name;
          sugg.classList.remove('visible');
          onSelect(team);
        };
        sugg.appendChild(item);
      });
    }
    sugg.classList.add('visible');
  });

  clearBtn.addEventListener('click', () => {
    input.value = '';
    clearBtn.classList.remove('visible');
    sugg.classList.remove('visible');
    onClear();
  });
}

function wireTeamPickers() {
  setupTeamPicker('teamA', () => teamB?.id ?? null, (team) => {
    teamA = team;
    renderResultsContext();
    loadResults(true);
  }, () => {
    teamA = null; teamB = null;
    renderResultsContext();
    renderResults();
  });

  if (teamA) {
    setupTeamPicker('teamB', () => teamA.id, (team) => {
      teamB = team;
      loadResults(true);
    }, () => {
      teamB = null;
      loadResults(true);
    });
  }
}

// ── Load dispatch ─────────────────────────────────────────────────────
async function loadResults(reset) {
  if (groupMode === 'round') return loadRoundResults(reset);
  if (groupMode === 'team') return loadTeamResults(reset);
  return loadLeagueResults(reset);
}

async function loadLeagueResults(reset) {
  if (reset) { resultsOffset = 0; loadedMatches = []; }
  const el = document.getElementById('resultsContent');
  if (reset) el.innerHTML = '<div class="loading-row">Loading results</div>';

  try {
    let path = '/matches?season=' + resultsSeason + '&limit=' + RESULTS_PAGE_SIZE + '&offset=' + resultsOffset;
    if (selectedLeagueId) path += '&leagueId=' + selectedLeagueId;
    const data = await api(path);
    resultsTotal = data.total ?? 0;
    (data.matches || []).forEach(m => { cacheLeagueHint(m); loadedMatches.push(m); });
    resultsOffset += (data.matches || []).length;
    renderResults();
  } catch (err) {
    el.innerHTML = emptyStateHtml("Couldn't load results", err.message);
  }
}

async function loadRoundResults() {
  const el = document.getElementById('resultsContent');
  if (!selectedLeagueId) { el.innerHTML = ''; return; }
  el.innerHTML = '<div class="loading-row">Loading round</div>';

  try {
    if (currentRoundId === null) {
      const seed = await api('/matches?leagueId=' + selectedLeagueId + '&season=' + resultsSeason + '&limit=1');
      const latest = (seed.matches || [])[0];
      currentRoundId = latest ? latest.round_id : 1;
    }
    const data = await api('/matches?leagueId=' + selectedLeagueId + '&roundId=' + currentRoundId + '&season=' + resultsSeason + '&limit=500');
    loadedMatches = (data.matches || []);
    loadedMatches.forEach(cacheLeagueHint);
    resultsTotal = loadedMatches.length;
    resultsOffset = loadedMatches.length;
    updateRoundLabel();
    renderResults();
  } catch (err) {
    el.innerHTML = emptyStateHtml("Couldn't load round", err.message);
  }
}

async function loadTeamResults(reset) {
  const el = document.getElementById('resultsContent');
  if (!teamA) { el.innerHTML = teamPickerPromptHtml(); return; }

  if (teamA && teamB) {
    el.innerHTML = '<div class="loading-row">Loading head-to-head</div>';
    try {
      const data = await api('/head-to-head?homeTeamId=' + teamA.id + '&awayTeamId=' + teamB.id);
      renderH2HList(data.records || []);
    } catch (err) {
      el.innerHTML = emptyStateHtml("Couldn't load head-to-head", err.message);
    }
    return;
  }

  if (reset) {
    resultsOffset = 0; loadedMatches = []; resultsTotal = 0;
    el.innerHTML = '<div class="loading-row">Loading match history</div>';
  }

  try {
    const belongs = m => m.home_team_id === teamA.id || m.away_team_id === teamA.id;
    const startCount = loadedMatches.filter(belongs).length;
    let pages = 0;
    while (loadedMatches.filter(belongs).length < startCount + 20 && pages < 6) {
      const data = await api('/matches?season=' + resultsSeason + '&limit=500&offset=' + resultsOffset);
      resultsTotal = data.total ?? 0;
      const batch = data.matches || [];
      resultsOffset += batch.length;
      pages++;
      batch.forEach(m => { cacheLeagueHint(m); loadedMatches.push(m); });
      if (batch.length === 0 || resultsOffset >= resultsTotal) break;
    }
    renderResults();
  } catch (err) {
    el.innerHTML = emptyStateHtml("Couldn't load match history", err.message);
  }
}

function teamPickerPromptHtml() {
  return '<div class="team-picker-prompt">Search a team above to see their match history — add a second team to see their head-to-head record.</div>';
}

// ── Filtering + rendering ────────────────────────────────────────────
function filteredMatches() {
  return loadedMatches.filter(m => {
    if (dateFrom && m.round_time && m.round_time.slice(0, 10) < dateFrom) return false;
    if (dateTo && m.round_time && m.round_time.slice(0, 10) > dateTo) return false;
    if (groupMode === 'team' && teamA) {
      if (m.home_team_id !== teamA.id && m.away_team_id !== teamA.id) return false;
    }
    return true;
  });
}

function loadMoreButtonHtml(label) {
  return '<button class="load-more-btn" id="loadMoreBtn">' + escapeHtml(label) + '</button>';
}
function wireLoadMore() {
  const btn = document.getElementById('loadMoreBtn');
  if (btn) btn.addEventListener('click', () => loadResults(false));
}

function renderResults() {
  const el = document.getElementById('resultsContent');

  if (groupMode === 'team') {
    if (!teamA) { el.innerHTML = teamPickerPromptHtml(); return; }
    if (teamA && teamB) return; // head-to-head already rendered by loadTeamResults

    const matches = filteredMatches();
    if (matches.length === 0) {
      el.innerHTML = emptyStateHtml('No matches found', teamA.name + ' has no recorded matches in this season yet.');
      return;
    }
    let html = renderMatchGroup(teamA.name, matches.length + ' match' + (matches.length === 1 ? '' : 'es'), matches);
    const hasMore = resultsOffset < resultsTotal;
    html += hasMore ? loadMoreButtonHtml('Load more matches') : '';
    el.innerHTML = html;
    if (hasMore) wireLoadMore();
    wireMatchRows();
    return;
  }

  if (groupMode === 'round') {
    const matches = filteredMatches();
    if (matches.length === 0) {
      el.innerHTML = emptyStateHtml('No matches in this round', 'Try another round number, or switch leagues above.');
      return;
    }
    el.innerHTML = '<div class="match-group">' + matches.map(renderMatchRow).join('') + '</div>';
    wireMatchRows();
    return;
  }

  // league mode — grouped by league + round, most recent round first
  const matches = filteredMatches();
  if (matches.length === 0) {
    el.innerHTML = emptyStateHtml('No matches found', 'Try a different league, date range, or season.');
    return;
  }
  let html = groupAndRender(matches, m => (m.league?.name ?? '') + '__' + m.round_id, (key, items) => {
    const first = items[0];
    const label = shortLeagueName(first.league?.name) + ' · Round ' + first.round_id;
    return renderMatchGroup(label, fmtDateTime(first.round_time), items);
  });
  const hasMore = resultsOffset < resultsTotal;
  html += hasMore ? loadMoreButtonHtml('Load more (' + (resultsTotal - resultsOffset) + ' remaining)') : '';
  el.innerHTML = html;
  if (hasMore) wireLoadMore();
  wireMatchRows();
}

function groupAndRender(matches, keyFn, renderFn) {
  const groups = new Map();
  matches.forEach(m => {
    const key = keyFn(m);
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(m);
  });
  let html = '';
  groups.forEach((items, key) => { html += renderFn(key, items); });
  return html;
}

function renderMatchGroup(title, meta, matches) {
  let html = '<div class="match-group"><div class="group-header"><span>' + escapeHtml(title) + '</span><span class="meta">' + escapeHtml(meta) + '</span></div>';
  matches.forEach(m => { html += renderMatchRow(m); });
  html += '</div>';
  return html;
}

function renderMatchRow(m) {
  const homeName = m.home_team?.name ?? ('Team ' + m.home_team_id);
  const awayName = m.away_team?.name ?? ('Team ' + m.away_team_id);
  const homeWin = (m.home_score ?? 0) > (m.away_score ?? 0);
  const awayWin = (m.away_score ?? 0) > (m.home_score ?? 0);
  return '<div class="match-row" data-match-id="' + m.match_id + '" data-home-team-id="' + m.home_team_id + '" data-away-team-id="' + m.away_team_id + '">' +
    '<div class="match-row-main">' +
      '<div class="match-time"><span class="d">' + escapeHtml(fmtDate(m.round_time)) + '</span><span class="t">' + escapeHtml(fmtTime(m.round_time)) + '</span></div>' +
      '<div class="match-team-name home' + (homeWin ? ' winner' : '') + '">' + escapeHtml(homeName) + '</div>' +
      '<div class="match-score-box">' +
        '<div class="full">' + (m.home_score ?? 0) + ' - ' + (m.away_score ?? 0) + '</div>' +
        '<div class="ht">HT ' + (m.ht_home_score ?? 0) + '-' + (m.ht_away_score ?? 0) + '</div>' +
      '</div>' +
      '<div class="match-team-name away' + (awayWin ? ' winner' : '') + '">' + escapeHtml(awayName) + '</div>' +
      '<div class="expand-chevron">▾</div>' +
    '</div>' +
    '<div class="match-detail" id="detail-' + m.match_id + '"><div class="loading-row" style="padding:10px;">Loading detail</div></div>' +
  '</div>';
}

function wireMatchRows() {
  document.querySelectorAll('.match-row').forEach(row => {
    row.querySelector('.match-row-main').addEventListener('click', () => {
      const wasOpen = row.classList.contains('open');
      row.classList.toggle('open', !wasOpen);
      if (!wasOpen) loadMatchDetail(row.dataset.matchId, row.dataset.homeTeamId, row.dataset.awayTeamId);
    });
  });
}

async function loadMatchDetail(matchId, homeTeamId, awayTeamId) {
  const container = document.getElementById('detail-' + matchId);
  if (matchDetailCache[matchId]) { renderMatchDetail(container, matchDetailCache[matchId]); return; }

  try {
    const [goals, statsRes, h2hRes] = await Promise.all([
      api('/matches/' + matchId + '/goals'),
      api('/matches/' + matchId + '/stats').catch(() => null),
      (homeTeamId && awayTeamId)
        ? api('/head-to-head?homeTeamId=' + homeTeamId + '&awayTeamId=' + awayTeamId).catch(() => null)
        : Promise.resolve(null),
    ]);
    const h2h = (h2hRes?.records || []).filter(r => String(r.reference_match_id) !== String(matchId));
    const detail = { goals: goals || [], stats: statsRes, h2h };
    matchDetailCache[matchId] = detail;
    renderMatchDetail(container, detail);
  } catch (err) {
    container.innerHTML = '<div class="no-detail">Couldn\'t load match detail.</div>';
  }
}

function renderMatchDetail(container, detail) {
  let html = '';
  const homeGoals = detail.goals.filter(g => g.team_side === 'home');
  const awayGoals = detail.goals.filter(g => g.team_side === 'away');

  if (detail.goals.length > 0) {
    html += '<div class="detail-section"><div class="detail-label">Goal Scorers</div>';
    homeGoals.concat(awayGoals).sort((a, b) => a.minute - b.minute).forEach(g => {
      html += '<div class="goal-line"><span>' + escapeHtml(g.scorer_name) + ' (' + (g.team_side === 'home' ? 'H' : 'A') + ')</span><span class="min">' + g.minute + "'</span></div>";
    });
    html += '</div>';
  }

  if (detail.stats && (detail.stats.possession_home != null || detail.stats.possession_away != null)) {
    const ph = detail.stats.possession_home ?? 50;
    const pa = detail.stats.possession_away ?? 50;
    html += '<div class="detail-section"><div class="detail-label">Possession</div>' +
      '<div class="stat-bar-row"><div class="stat-bar-labels"><span>' + ph + '%</span><span>' + pa + '%</span></div>' +
      '<div class="stat-bar-track"><div class="stat-bar-home" style="width:' + ph + '%"></div><div class="stat-bar-away" style="width:' + pa + '%"></div></div></div></div>';
  } else {
    html += '<div class="no-detail">No possession/stats recorded for this match.</div>';
  }

  html += '<div class="detail-section"><div class="detail-label">Head-to-Head' + (detail.h2h && detail.h2h.length ? ' <span class="h2h-count">(' + detail.h2h.length + ')</span>' : '') + '</div>';
  if (detail.h2h && detail.h2h.length > 0) {
    detail.h2h.forEach(r => {
      const homeName = r.home_team?.name ?? ('Team ' + r.home_team_id);
      const awayName = r.away_team?.name ?? ('Team ' + r.away_team_id);
      const homeWin = (r.home_score ?? 0) > (r.away_score ?? 0);
      const awayWin = (r.away_score ?? 0) > (r.home_score ?? 0);
      html += '<div class="h2h-row">' +
        '<span class="h2h-date">' + fmtDate(r.match_start_time) + '</span>' +
        '<span class="h2h-team' + (homeWin ? ' winner' : '') + '">' + escapeHtml(homeName) + '</span>' +
        '<span class="h2h-score">' + (r.home_score ?? 0) + '–' + (r.away_score ?? 0) + '</span>' +
        '<span class="h2h-team' + (awayWin ? ' winner' : '') + '">' + escapeHtml(awayName) + '</span>' +
      '</div>';
    });
  } else {
    html += '<div class="no-detail">No previous meetings on record.</div>';
  }
  html += '</div>';

  container.innerHTML = html || '<div class="no-detail">No additional detail for this match.</div>';
}

function renderH2HList(records) {
  const el = document.getElementById('resultsContent');
  if (!records.length) {
    el.innerHTML = emptyStateHtml('No meetings recorded', teamA.name + ' and ' + teamB.name + " haven't played each other yet in our records.");
    return;
  }
  let html = '<div class="match-group"><div class="group-header"><span>' + escapeHtml(teamA.name) + ' vs ' + escapeHtml(teamB.name) + '</span><span class="meta">' + records.length + ' meeting' + (records.length === 1 ? '' : 's') + '</span></div>';
  records.forEach(r => {
    const homeName = r.home_team?.name ?? ('Team ' + r.home_team_id);
    const awayName = r.away_team?.name ?? ('Team ' + r.away_team_id);
    const homeWin = (r.home_score ?? 0) > (r.away_score ?? 0);
    const awayWin = (r.away_score ?? 0) > (r.home_score ?? 0);
    html += '<div class="h2h-row">' +
      '<span class="h2h-date">' + fmtDate(r.match_start_time) + '</span>' +
      '<span class="h2h-team' + (homeWin ? ' winner' : '') + '">' + escapeHtml(homeName) + '</span>' +
      '<span class="h2h-score">' + (r.home_score ?? 0) + '–' + (r.away_score ?? 0) + '</span>' +
      '<span class="h2h-team' + (awayWin ? ' winner' : '') + '">' + escapeHtml(awayName) + '</span>' +
    '</div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

// ── Export picker ────────────────────────────────────────────────────

// Build and attach a picker popover to btn.parentNode.
// options: [{ label, dataset: {key: value} }]
// onPick(dataset) is called when an option is clicked.
function _showPicker(btn, titleText, options, onPick) {
  document.getElementById('exportPicker')?.remove();

  const picker = document.createElement('div');
  picker.id = 'exportPicker';
  picker.className = 'export-picker';

  const title = document.createElement('div');
  title.className = 'export-picker-title';
  title.textContent = titleText;
  picker.appendChild(title);

  options.forEach(({ label, dataset }) => {
    const b = document.createElement('button');
    b.textContent = label;
    Object.entries(dataset).forEach(([k, v]) => (b.dataset[k] = v));
    picker.appendChild(b);
  });

  btn.parentNode.appendChild(picker);

  picker.addEventListener('click', e => {
    const b = e.target.closest('button[data-' + Object.keys(options[0].dataset)[0] + ']');
    if (!b) return;
    picker.remove();
    document.removeEventListener('click', onOutside, true);
    onPick(b.dataset);
  });

  function onOutside(e) {
    if (!picker.contains(e.target) && e.target !== btn) {
      picker.remove();
      document.removeEventListener('click', onOutside, true);
    }
  }
  setTimeout(() => document.addEventListener('click', onOutside, true), 0);
}

function toggleExportPicker(btn) {
  if (document.getElementById('exportPicker')) {
    document.getElementById('exportPicker').remove();
    return;
  }

  _showPicker(btn, 'Export format:', [
    { label: '📄 .txt', dataset: { fmt: 'txt' } },
    { label: '📊 .csv', dataset: { fmt: 'csv' } },
    { label: '📝 .md',  dataset: { fmt: 'md'  } },
    { label: '🐍 .py',  dataset: { fmt: 'py'  } },
  ], ({ fmt }) => {
    // Step 2: ask how many seasons
    _showPicker(btn, 'Seasons to include:', [
      { label: 'Current season only',  dataset: { scope: '0' } },
      { label: '+ 1 previous season',  dataset: { scope: '1' } },
      { label: 'All 3 seasons',        dataset: { scope: '2' } },
    ], ({ scope }) => {
      doExport(fmt, parseInt(scope, 10));
    });
  });
}

// ── Shared export engine ─────────────────────────────────────────────
// scope: 0 = current season only | 1 = current + 1 previous | 2 = all 3 seasons

async function doExport(format, scope = 2) {
  if (!selectedLeagueId) {
    alert('Select a specific league first — the export needs all three seasons for one league.');
    return;
  }

  const btn = document.getElementById('exportCsvBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Exporting…'; }

  try {
    // ── 1. Fetch the requested seasons ─────────────────────────────────
    async function fetchAllSeason(season) {
      const all = [];
      let offset = 0;
      while (true) {
        const d = await api('/matches?leagueId=' + selectedLeagueId + '&season=' + season + '&limit=500&offset=' + offset);
        const batch = d.matches || [];
        all.push(...batch);
        offset += batch.length;
        if (batch.length < 500 || offset >= (d.total || 0)) break;
      }
      all.sort((a, b) => (a.round_id || 0) - (b.round_id || 0) || (a.match_id || 0) - (b.match_id || 0));
      return all;
    }

    const [current, previous, oldest] = await Promise.all([
      fetchAllSeason(0),
      scope >= 1 ? fetchAllSeason(1) : Promise.resolve([]),
      scope >= 2 ? fetchAllSeason(2) : Promise.resolve([]),
    ]);

    // chronological order: oldest first
    const allMatches = [...oldest, ...previous, ...current];
    if (allMatches.length === 0) {
      alert('No match data found for this league across any season.');
      return;
    }

    // ── 2. Date helpers ─────────────────────────────────────────────────
    function addDays(dateStr, n) {
      const d = new Date(dateStr + 'T00:00:00Z');
      d.setUTCDate(d.getUTCDate() + n);
      return d.toISOString().slice(0, 10);
    }
    function addMonths(dateStr, n) {
      const d = new Date(dateStr + 'T00:00:00Z');
      d.setUTCMonth(d.getUTCMonth() + n);
      return d.toISOString().slice(0, 10);
    }

    // ── 3. Assign fake dates ────────────────────────────────────────────
    function assignSeasonDates(matches, startDate) {
      const map = new Map();
      if (!matches.length) return { map, lastDate: startDate };
      const rounds = new Map();
      matches.forEach(m => {
        const r = m.round_id ?? 1;
        if (!rounds.has(r)) rounds.set(r, []);
        rounds.get(r).push(m);
      });
      const sortedRoundIds = [...rounds.keys()].sort((a, b) => a - b);
      let date = startDate;
      sortedRoundIds.forEach((rid, idx) => {
        if (idx > 0) date = addDays(date, 7);
        rounds.get(rid).forEach(m => map.set(m.match_id, date));
      });
      return { map, lastDate: date };
    }

    // Each season tier is anchored to a fixed August start — the real
    // football calendar always opens in August regardless of round count.
    // Within each season the code steps +7 days per round, so leagues
    // with different round counts spread naturally inside their window:
    //   38 rounds → Aug → Apr   |   20 rounds → Aug → Dec
    //
    //   season_index 2 (oldest)   → 2023/24 → anchor 2023-08-01
    //   season_index 1 (previous) → 2024/25 → anchor 2024-08-01
    //   season_index 0 (current)  → 2025/26 → anchor 2025-08-01
    const S_OLDEST   = '2023-08-01';
    const S_PREVIOUS = '2024-08-01';
    const S_CURRENT  = '2025-08-01';
    const s0start = S_CURRENT;   // used for season label in header
    let fakeDates;

    if (scope === 0) {
      // Current season only → 2025/26
      const { map: s0m } = assignSeasonDates(current, S_CURRENT);
      fakeDates = s0m;
    } else if (scope === 1) {
      // Previous → 2024/25, current → 2025/26
      const { map: s1m } = assignSeasonDates(previous, S_PREVIOUS);
      const { map: s0m } = assignSeasonDates(current,  S_CURRENT);
      fakeDates = new Map([...s1m, ...s0m]);
    } else {
      // Oldest → 2023/24, previous → 2024/25, current → 2025/26
      const { map: s2m } = assignSeasonDates(oldest,   S_OLDEST);
      const { map: s1m } = assignSeasonDates(previous, S_PREVIOUS);
      const { map: s0m } = assignSeasonDates(current,  S_CURRENT);
      fakeDates = new Map([...s2m, ...s1m, ...s0m]);
    }

    // ── 4. Header values ────────────────────────────────────────────────
    function seasonLabel(dateStr) {
      const y  = parseInt(dateStr.slice(0, 4), 10);
      const mo = parseInt(dateStr.slice(5, 7), 10);
      return mo >= 6 ? y + '/' + String(y + 1).slice(-2)
                     : (y - 1) + '/' + String(y).slice(-2);
    }
    const firstMatch       = allMatches.find(m => m.league?.name);
    const leagueName       = shortLeagueName(firstMatch?.league?.name || 'League');
    const currentMatchday  = current.length ? Math.max(...current.map(m => m.round_id || 0)) : 0;
    const currentSeasonLbl = seasonLabel(s0start);
    const scopeSuffix      = ['current-only', '2-seasons', 'all-seasons'][scope] ?? 'export';
    const fileBase         = leagueName.replace(/[\s/\\]+/g, '-') + '-' + scopeSuffix;

    // ── 5. Goal-minute helpers ──────────────────────────────────────────
    function parseGoalMins(field) {
      if (field == null) return null;
      let arr = field;
      if (typeof arr === 'string') { try { arr = JSON.parse(arr); } catch { return null; } }
      if (!Array.isArray(arr)) return null;
      return arr
        .map(s => parseInt(s.time ?? s.minute ?? s.min ?? '', 10))
        .filter(v => v > 0)
        .map(v => Math.min(v, 90))
        .sort((a, b) => a - b);
    }
    // Same token on both mirrored rows (home=H, away=A from venue perspective).
    // Returns null -> omit Goals key entirely.
    // Returns ''   -> verified 0-0 (goal_events present but empty, score 0-0).
    function goalsToken(m) {
      // Primary path: goal_events array is included by the /matches endpoint
      // via a Supabase join (goal_events(team_side, minute)).
      if (Array.isArray(m.goal_events)) {
        const h = m.goal_events
          .filter(g => g.team_side === 'home' && g.minute > 0)
          .map(g => g.minute)
          .sort((a, b) => a - b);
        const a = m.goal_events
          .filter(g => g.team_side === 'away' && g.minute > 0)
          .map(g => g.minute)
          .sort((a, b) => a - b);
        if (h.length === 0 && a.length === 0) {
          // No goal events stored -- either genuine 0-0 or data not collected.
          return ((m.home_score || 0) === 0 && (m.away_score || 0) === 0) ? '' : null;
        }
        return [...h.map(mn => mn + 'H'), ...a.map(mn => mn + 'A')].join(',');
      }
      // Fallback: legacy goalscorers_home/away fields (not present in current
      // API responses -- only reached if an older API version is in use).
      const hMins = parseGoalMins(m.goalscorers_home);
      const aMins = parseGoalMins(m.goalscorers_away);
      if (hMins === null && aMins === null) return null;
      const h = hMins || [], a = aMins || [];
      if (h.length === 0 && a.length === 0) {
        return ((m.home_score || 0) === 0 && (m.away_score || 0) === 0) ? '' : null;
      }
      return [...h.map(mn => mn + 'H'), ...a.map(mn => mn + 'A')].join(',');
    }

    // Strips synthetic data-source prefixes ("ZTurbo." or "Z.") that show up
    // in front of team names in some datasets, e.g. "ZTurbo.Man City" -> "Man City".
    function stripTeamPrefix(name) {
      return String(name ?? '').replace(/^Z(?:Turbo)?\./, '');
    }

    // Per-perspective field values
    function rowFields(m, side) {
      const isHome = side === 'home';
      return {
        team:     stripTeamPrefix(isHome ? (m.home_team?.name ?? m.home_team_id) : (m.away_team?.name ?? m.away_team_id)),
        opp:      stripTeamPrefix(isHome ? (m.away_team?.name ?? m.away_team_id) : (m.home_team?.name ?? m.home_team_id)),
        venue:    isHome ? 'H' : 'A',
        scored:   isHome ? (m.home_score    ?? 0) : (m.away_score    ?? 0),
        conceded: isHome ? (m.away_score    ?? 0) : (m.home_score    ?? 0),
        htSc:     isHome ? (m.ht_home_score ?? 0) : (m.ht_away_score ?? 0),
        htCon:    isHome ? (m.ht_away_score ?? 0) : (m.ht_home_score ?? 0),
        cornW:    isHome ? m.home_corners : m.away_corners,
        cornC:    isHome ? m.away_corners : m.home_corners,
      };
    }

    // H2H encounter list for the latest round's fixtures.
    // Dates are NOT the real fixture dates — they're synthetic, anchored on
    // the most recent meeting's fake date, then stepped back 6 months per
    // older encounter (most-recent = anchor, next older = anchor - 6mo, etc.)
    const latestRound = current.filter(m => m.round_id === currentMatchday);
    const h2hEncounters = [];  // [{date, hName, score, aName}]
    latestRound.forEach(fixture => {
      const tA = fixture.home_team_id, tB = fixture.away_team_id;
      const encs = allMatches
        .filter(m => (m.home_team_id===tA && m.away_team_id===tB) || (m.home_team_id===tB && m.away_team_id===tA))
        .sort((a, b) => (fakeDates.get(b.match_id)||'').localeCompare(fakeDates.get(a.match_id)||''));
      if (!encs.length) return;
      const anchor = fakeDates.get(encs[0].match_id) || '2000-01-01';
      encs.forEach((enc, idx) => {
        h2hEncounters.push({
          date:  idx === 0 ? anchor : addMonths(anchor, -6 * idx),
          hName: stripTeamPrefix(enc.home_team?.name ?? enc.home_team_id),
          score: (enc.home_score ?? 0) + '-' + (enc.away_score ?? 0),
          aName: stripTeamPrefix(enc.away_team?.name ?? enc.away_team_id),
        });
      });
    });

    // ── 6. Format renderers ─────────────────────────────────────────────
    // All four formats share the exact same per-match line text —
    // 'Match N: Date: ... | Team: ... | Opponent: ... | ...' — built once
    // here. Each renderer below only differs in how it wraps that shared
    // line text (and the shared H2H line text) inside its own file syntax.

    // Builds the canonical 'Match N: ...' line array (shared by every format).
    function buildMatchLines() {
      const lines = [];
      let n = 0;
      allMatches.forEach(m => {
        const fd = fakeDates.get(m.match_id) || '2000-01-01';
        const gt = goalsToken(m);
        ['home', 'away'].forEach(side => {
          const f = rowFields(m, side);
          const parts = [
            'Date: ' + fd,
            'Team: ' + f.team,
            'Opponent: ' + f.opp + ' (' + f.venue + ')',
            'Goals Scored: ' + f.scored,
            'Goals Conceded: ' + f.conceded,
            'HT Scored: ' + f.htSc,
            'HT Conceded: ' + f.htCon,
          ];
          if (f.cornW != null) parts.push('Corners Won: ' + f.cornW);
          if (f.cornC != null) parts.push('Corners Conceded: ' + f.cornC);
          if (gt !== null) parts.push('Goals: ' + gt);
          lines.push('Match ' + (++n) + ': ' + parts.join(' | '));
        });
      });
      return lines;
    }

    // Builds the canonical H2H line array (shared by every format).
    function buildH2HLines() {
      return h2hEncounters.map(e => e.date + ' ' + e.hName + ' ' + e.score + ' ' + e.aName);
    }
